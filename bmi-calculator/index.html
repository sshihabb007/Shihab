    <script>
        // DOM Elements
        const mehedi_btnMetric = document.getElementById('mehedi_btnMetric');
        const mehedi_btnImperial = document.getElementById('mehedi_btnImperial');
        const shihab_metricInputs = document.getElementById('shihab_metricInputs');
        const shihab_imperialInputs = document.getElementById('shihab_imperialInputs');
        
        const mehedi_weightKg = document.getElementById('mehedi_weightKg');
        const mehedi_heightCm = document.getElementById('mehedi_heightCm');
        const shihab_metricHeightUnit = document.getElementById('shihab_metricHeightUnit');
        const shihab_metricHeightFtWrap = document.getElementById('shihab_metricHeightFtWrap');
        const mehedi_metricHeightFt = document.getElementById('mehedi_metricHeightFt');
        const mehedi_metricHeightIn = document.getElementById('mehedi_metricHeightIn');
        
        const mehedi_weightLbs = document.getElementById('mehedi_weightLbs');
        const mehedi_heightFt = document.getElementById('mehedi_heightFt');
        const mehedi_heightIn = document.getElementById('mehedi_heightIn');
        
        const mehedi_bmiValue = document.getElementById('mehedi_bmiValue');
        const shihab_bmiStatus = document.getElementById('shihab_bmiStatus');
        const sshihabb007_needle = document.getElementById('sshihabb007_needle');
        const shihab_statusTopBar = document.getElementById('shihab_statusTopBar');
        
        const mehedi_insightsCard = document.getElementById('mehedi_insightsCard');
        const shihab_idealWeight = document.getElementById('shihab_idealWeight');
        const sshihabb007_actionPlan = document.getElementById('sshihabb007_actionPlan');

        const sshihabb007_saveBtn = document.getElementById('sshihabb007_saveBtn');
        const shihab_historySection = document.getElementById('shihab_historySection');
        const sshihabb007_historyList = document.getElementById('sshihabb007_historyList');
        const mehedi_clearHistoryBtn = document.getElementById('mehedi_clearHistoryBtn');

        let shihab_currentMode = 'metric';
        let mehedi_lastCalculatedBmi = null;
        let sshihabb007_lastWeightStr = "";

        // Toggle Modes
        mehedi_btnMetric.addEventListener('click', () => {
            shihab_currentMode = 'metric';
            mehedi_btnMetric.className = "flex-1 py-2.5 rounded-lg bg-indigo-600 text-white font-bold shadow-md transition-all";
            mehedi_btnImperial.className = "flex-1 py-2.5 rounded-lg text-gray-400 font-bold hover:text-gray-200 transition-all bg-transparent";
            shihab_metricInputs.classList.remove('hidden');
            shihab_imperialInputs.classList.add('hidden');
            shihab_calculateBMI();
        });

        mehedi_btnImperial.addEventListener('click', () => {
            shihab_currentMode = 'imperial';
            mehedi_btnImperial.className = "flex-1 py-2.5 rounded-lg bg-indigo-600 text-white font-bold shadow-md transition-all";
            mehedi_btnMetric.className = "flex-1 py-2.5 rounded-lg text-gray-400 font-bold hover:text-gray-200 transition-all bg-transparent";
            shihab_imperialInputs.classList.remove('hidden');
            shihab_metricInputs.classList.add('hidden');
            shihab_calculateBMI();
        });

        // Height Unit Toggle in Metric
        shihab_metricHeightUnit.addEventListener('change', (e) => {
            if (e.target.value === 'cm') {
                mehedi_heightCm.classList.remove('hidden');
                shihab_metricHeightFtWrap.classList.add('hidden');
            } else {
                mehedi_heightCm.classList.add('hidden');
                shihab_metricHeightFtWrap.classList.remove('hidden');
            }
            shihab_calculateBMI();
        });

        // Input Listeners
        [mehedi_weightKg, mehedi_heightCm, mehedi_metricHeightFt, mehedi_metricHeightIn, mehedi_weightLbs, mehedi_heightFt, mehedi_heightIn].forEach(input => {
            input.addEventListener('input', shihab_calculateBMI);
        });

        // Copy Feature
        const shihab_copyBmiBtn = document.getElementById('shihab_copyBmiBtn');
        shihab_copyBmiBtn.addEventListener('click', () => {
            if (!mehedi_lastCalculatedBmi) return;
            
            const copyText = `My BMI Stats:\nBMI: ${mehedi_lastCalculatedBmi}\nStatus: ${shihab_bmiStatus.innerText}\nIdeal Weight: ${shihab_idealWeight.innerText}\nAction Plan: ${sshihabb007_actionPlan.innerText}`;
            
            navigator.clipboard.writeText(copyText).then(() => {
                const originalHtml = shihab_copyBmiBtn.innerHTML;
                shihab_copyBmiBtn.innerHTML = '<i class="fas fa-check text-green-400"></i> Copied!';
                setTimeout(() => {
                    shihab_copyBmiBtn.innerHTML = originalHtml;
                }, 2000);
            });
        });

        // Calculation Logic
        function shihab_calculateBMI() {
            let bmi = 0;
            let weight = 0;
            let height = 0;
            let isMetric = shihab_currentMode === 'metric';

            if (isMetric) {
                weight = parseFloat(mehedi_weightKg.value);
                const metricUnit = shihab_metricHeightUnit.value;
                if (metricUnit === 'cm') {
                    height = parseFloat(mehedi_heightCm.value) / 100; // to meters
                } else {
                    let ft = parseFloat(mehedi_metricHeightFt.value) || 0;
                    let inc = parseFloat(mehedi_metricHeightIn.value) || 0;
                    height = ((ft * 12) + inc) * 0.0254; // to meters
                }
                
                if (weight > 0 && height > 0) {
                    bmi = weight / (height * height);
                    sshihabb007_lastWeightStr = `${weight} kg`;
                }
            } else {
                weight = parseFloat(mehedi_weightLbs.value);
                let ft = parseFloat(mehedi_heightFt.value) || 0;
                let inc = parseFloat(mehedi_heightIn.value) || 0;
                height = (ft * 12) + inc; // in inches
                if (weight > 0 && height > 0) {
                    bmi = 703 * (weight / (height * height));
                    sshihabb007_lastWeightStr = `${weight} lbs`;
                }
            }

            if (bmi > 0 && bmi < 100) {
                mehedi_lastCalculatedBmi = bmi.toFixed(1);
                mehedi_updateUI(parseFloat(mehedi_lastCalculatedBmi), weight, height, isMetric);
            } else {
                mehedi_lastCalculatedBmi = null;
                mehedi_resetUI();
            }
        }

        function mehedi_updateUI(bmi, weight, height, isMetric) {
            mehedi_bmiValue.innerText = bmi;
            mehedi_insightsCard.classList.remove('hidden');
            
            // Color Logic
            let statusText = "";
            let colorClass = "";
            let borderColor = "";
            let percentage = 0; // 0 to 100 for gauge

            // Mapping BMI to a 0-100% scale. 
            // <18.5 is 0-24%
            // 18.5 - 24.9 is 25-50%
            // 25 - 29.9 is 51-75%
            // 30+ is 76-100%

            if (bmi < 18.5) {
                statusText = "Underweight";
                colorClass = "bg-blue-500/20 text-blue-400 border-blue-500/50";
                borderColor = "#3b82f6";
                percentage = (bmi / 18.5) * 24;
            } else if (bmi < 25) {
                statusText = "Healthy Weight";
                colorClass = "bg-green-500/20 text-green-400 border-green-500/50";
                borderColor = "#22c55e";
                percentage = 25 + ((bmi - 18.5) / (25 - 18.5)) * 25;
            } else if (bmi < 30) {
                statusText = "Overweight";
                colorClass = "bg-yellow-500/20 text-yellow-400 border-yellow-500/50";
                borderColor = "#eab308";
                percentage = 50 + ((bmi - 25) / (30 - 25)) * 25;
            } else {
                statusText = "Obese";
                colorClass = "bg-red-500/20 text-red-400 border-red-500/50";
                borderColor = "#ef4444";
                percentage = 75 + ((bmi - 30) / 10) * 25;
            }

            // Cap percentage
            if (percentage < 0) percentage = 0;
            if (percentage > 100) percentage = 100;

            shihab_bmiStatus.innerText = statusText;
            shihab_bmiStatus.className = `mt-2 px-6 py-2 rounded-full font-bold text-sm uppercase tracking-wide border transition-colors duration-300 ${colorClass}`;
            mehedi_bmiValue.style.color = borderColor;
            shihab_statusTopBar.style.backgroundColor = borderColor;
            shihab_statusTopBar.style.opacity = "1";
            
            // Move needle
            sshihabb007_needle.style.left = `${percentage}%`;

            // Insights
            let idealMin, idealMax;
            if (isMetric) {
                idealMin = (18.5 * height * height).toFixed(1);
                idealMax = (24.9 * height * height).toFixed(1);
                shihab_idealWeight.innerText = `${idealMin} - ${idealMax} kg`;
                
                if (bmi < 18.5) {
                    let diff = (idealMin - weight).toFixed(1);
                    sshihabb007_actionPlan.innerText = `Gain ${diff} kg`;
                    sshihabb007_actionPlan.className = "font-bold text-blue-400";
                } else if (bmi >= 25) {
                    let diff = (weight - idealMax).toFixed(1);
                    sshihabb007_actionPlan.innerText = `Lose ${diff} kg`;
                    sshihabb007_actionPlan.className = "font-bold text-yellow-400";
                    if(bmi >= 30) sshihabb007_actionPlan.className = "font-bold text-red-400";
                } else {
                    sshihabb007_actionPlan.innerText = `Maintain Weight! 🎉`;
                    sshihabb007_actionPlan.className = "font-bold text-green-400";
                }
            } else {
                // Imperial
                idealMin = ((18.5 * height * height) / 703).toFixed(1);
                idealMax = ((24.9 * height * height) / 703).toFixed(1);
                shihab_idealWeight.innerText = `${idealMin} - ${idealMax} lbs`;
                
                if (bmi < 18.5) {
                    let diff = (idealMin - weight).toFixed(1);
                    sshihabb007_actionPlan.innerText = `Gain ${diff} lbs`;
                    sshihabb007_actionPlan.className = "font-bold text-blue-400";
                } else if (bmi >= 25) {
                    let diff = (weight - idealMax).toFixed(1);
                    sshihabb007_actionPlan.innerText = `Lose ${diff} lbs`;
                    sshihabb007_actionPlan.className = "font-bold text-yellow-400";
                    if(bmi >= 30) sshihabb007_actionPlan.className = "font-bold text-red-400";
                } else {
                    sshihabb007_actionPlan.innerText = `Maintain Weight! 🎉`;
                    sshihabb007_actionPlan.className = "font-bold text-green-400";
                }
            }
        }

        function mehedi_resetUI() {
            mehedi_bmiValue.innerText = "--.-";
            mehedi_bmiValue.style.color = "var(--text-main)";
            shihab_bmiStatus.innerText = "Awaiting Input";
            shihab_bmiStatus.className = "mt-2 px-6 py-2 rounded-full font-bold text-sm bg-gray-500/20 text-gray-400 transition-colors duration-300 uppercase tracking-wide border border-transparent";
            shihab_statusTopBar.style.backgroundColor = "transparent";
            sshihabb007_needle.style.left = "0%";
            mehedi_insightsCard.classList.add('hidden');
        }

        // Local Storage History
        function sshihabb007_loadHistory() {
            const history = JSON.parse(localStorage.getItem('shihab_bmiHistory') || '[]');
            if (history.length > 0) {
                shihab_historySection.classList.remove('hidden');
                sshihabb007_historyList.innerHTML = history.map(item => `
                    <div class="sshihabb007-history-item">
                        <div>
                            <span class="font-bold text-indigo-400 text-lg mr-2">${item.bmi}</span>
                            <span class="text-xs text-gray-500 font-semibold uppercase tracking-wider">${item.status}</span>
                        </div>
                        <div class="text-left sm:text-right">
                            <div class="text-sm font-semibold" style="color: var(--text-main);">${item.weight}</div>
                            <div class="text-xs text-gray-500">${new Date(item.date).toLocaleDateString()}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                shihab_historySection.classList.add('hidden');
            }
        }

        sshihabb007_saveBtn.addEventListener('click', () => {
            if (mehedi_lastCalculatedBmi) {
                const history = JSON.parse(localStorage.getItem('shihab_bmiHistory') || '[]');
                const newItem = {
                    bmi: mehedi_lastCalculatedBmi,
                    weight: sshihabb007_lastWeightStr,
                    status: shihab_bmiStatus.innerText,
                    date: new Date().toISOString()
                };
                history.unshift(newItem);
                if (history.length > 5) history.pop(); // Keep last 5
                localStorage.setItem('shihab_bmiHistory', JSON.stringify(history));
                
                // Animate Button
                const originalHtml = sshihabb007_saveBtn.innerHTML;
                sshihabb007_saveBtn.innerHTML = '<i class="fas fa-check text-green-400"></i> Saved!';
                sshihabb007_saveBtn.classList.add('bg-green-600/20', 'text-green-400');
                
                setTimeout(() => {
                    sshihabb007_saveBtn.innerHTML = originalHtml;
                    sshihabb007_saveBtn.classList.remove('bg-green-600/20', 'text-green-400');
                }, 2000);

                sshihabb007_loadHistory();
            }
        });

        mehedi_clearHistoryBtn.addEventListener('click', () => {
            localStorage.removeItem('shihab_bmiHistory');
            sshihabb007_loadHistory();
        });

        // Init
        sshihabb007_loadHistory();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../sw.js').then(reg => {
                    console.log('Service Worker registered!');
                }).catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body>
</html>
